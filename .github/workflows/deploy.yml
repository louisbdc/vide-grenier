name: Deploy backend to VPS

# Déploie le backend (Server/) sur le VPS OVH à chaque push sur main.
# Le VPS clone/pull le repo public, régénère .env depuis les secrets GitHub,
# puis relance la stack Docker (Mongo + API + Caddy HTTPS).
on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 152.228.136.49
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: JWT_SECRET,DATATOURISME_API_KEY
          script: |
            set -e
            if [ ! -d ~/vide-grenier ]; then
              git clone https://github.com/louisbdc/vide-grenier.git ~/vide-grenier
            fi
            cd ~/vide-grenier && git fetch origin main && git reset --hard origin/main
            cd Server
            printf 'PORT=8080\nMONGO_URL=mongodb://mongo:27017/videgrenier?replicaSet=rs0\nJWT_SECRET=%s\nDATATOURISME_API_KEY=%s\nPHOTOS_DIR=/data/photos\nCORS_ORIGIN=*\n' \
              "$JWT_SECRET" "$DATATOURISME_API_KEY" > .env
            docker compose up -d --build
            docker image prune -f
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATATOURISME_API_KEY: ${{ secrets.DATATOURISME_API_KEY }}
